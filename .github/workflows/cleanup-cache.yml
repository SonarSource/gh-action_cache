name: Cleanup S3 Cache

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name (e.g., 'feature/my-branch'). Leave empty to list all cache entries."
        required: false
        type: string
        default: ""
      key:
        description: "Cache key prefix to filter (e.g., 'sccache-Linux-'). Works in both list and delete mode."
        required: false
        type: string
        default: ""
      environment:
        description: "Target environment"
        required: false
        type: choice
        options:
          - prod
          - dev
        default: prod
      dry-run:
        description: "Preview mode - show what would be deleted without deleting"
        required: false
        type: boolean
        default: true

jobs:
  cleanup:
    runs-on: github-ubuntu-latest-s
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cleanup cache
        uses: ./cleanup
        with:
          branch: ${{ inputs.branch }}
          key: ${{ inputs.key }}
          environment: ${{ inputs.environment }}
          dry-run: ${{ inputs.dry-run }}
