name: Cleanup S3 Cache

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name to clean cache for (e.g., 'feature/my-branch')"
        required: true
        type: string
      key:
        description: "Cache key prefix to delete (e.g., 'sccache-Linux-'). Leave empty to delete all cache for the branch."
        required: false
        type: string
        default: ""
      environment:
        description: "Target environment"
        required: false
        type: choice
        options:
          - prod
          - dev
        default: prod
      dry-run:
        description: "Preview mode - show what would be deleted without deleting"
        required: false
        type: boolean
        default: true

jobs:
  cleanup:
    runs-on: github-ubuntu-latest-s
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cleanup cache
        uses: ./cleanup
        with:
          branch: ${{ inputs.branch }}
          key: ${{ inputs.key }}
          environment: ${{ inputs.environment }}
          dry-run: ${{ inputs.dry-run }}
