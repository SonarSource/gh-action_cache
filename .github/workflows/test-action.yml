name: Test

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  test-github-cache:
    runs-on: github-ubuntu-latest-s
    permissions:
      id-token: write
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      with:
        version: 2025.7.12
    - name: Cache Python dependencies
      id: cache-python
      uses: ./
      with:
        path: ~/.cache/pip
        key: python-${{ runner.os }}-pytest-requests
        restore-keys: python-${{ runner.os }}-
        backend: github
    - name: Check cache hit result
      run: |
        echo "Cache hit: ${{ steps.cache-python.outputs.cache-hit }}"
        if [ "${{ steps.cache-python.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Cache was found and restored"
        else
          echo "❌ Cache was not found, will need to rebuild"
        fi
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest requests
    - name: Run tests
      run: python -m pytest --version

  test-s3-cache:
    runs-on: github-ubuntu-latest-s
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2025.7.12
      - name: Cache Python dependencies
        id: cache-python
        uses: ./
        with:
          path: ~/.cache/pip
          key: python-${{ runner.os }}-pytest-requests
          restore-keys: python-${{ runner.os }}-
          environment: dev
          backend: s3

      - name: Check cache hit result
        run: |
          echo "Cache hit: ${{ steps.cache-python.outputs.cache-hit }}"
          if [ "${{ steps.cache-python.outputs.cache-hit }}" == "true" ]; then
            echo "✅ Cache was found and restored"
          else
            echo "❌ Cache was not found, will need to rebuild"
          fi
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests
      - name: Run tests
        run: python -m pytest --version

  test-s3-cache-with-fallback:
    runs-on: github-ubuntu-latest-s
    permissions:
      id-token: write
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      with:
        version: 2025.7.12
    - name: Cache Go modules with fallback branch
      id: cache-go
      uses: ./
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: go-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          go-${{ runner.os }}-
        fail-on-cache-miss: false
        fallback-branch: refs/heads/branch-2
        fallback-to-default-branch: 'true'
        environment: dev
        backend: s3
    - name: Check Go cache hit result
      run: |
        echo "Go cache hit: ${{ steps.cache-go.outputs.cache-hit }}"
        if [ "${{ steps.cache-go.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Go cache was found and restored"
        else
          echo "❌ Go cache was not found, will need to rebuild"
        fi
    - name: Create simple Go module
      run: |
        go mod init example
        echo 'package main
        import "fmt"
        func main() {
            fmt.Println("Hello, World!")
        }' > main.go
    - name: Download dependencies
      run: go mod download
    - name: Build
      run: go build -o hello main.go

  test-s3-cache-with-credential-interference:
    runs-on: github-ubuntu-latest-s
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2025.7.12

      # Step 1: Use our cache action (should restore and later save)
      - name: Cache with S3
        id: cache-test
        uses: ./
        with:
          path: ~/.cache/pip
          key: interference-test-${{ runner.os }}-${{ github.run_id }}
          restore-keys: interference-test-${{ runner.os }}-
          environment: dev
          backend: s3

      # Step 2: Simulate user overwriting AWS credentials
      # This is the scenario that caused production failures
      - name: Overwrite AWS credentials (simulating user workflow)
        run: |
          {
            echo "AWS_ACCESS_KEY_ID=FAKE_KEY_TO_OVERRIDE"
            echo "AWS_SECRET_ACCESS_KEY=FAKE_SECRET_TO_OVERRIDE"
            echo "AWS_SESSION_TOKEN=FAKE_TOKEN_TO_OVERRIDE"
          } >> "$GITHUB_ENV"
          echo "Simulated credential override via GITHUB_ENV"

      # Step 3: Create something to cache
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      # Post-step: credential-guard restores real creds, then runs-on/cache saves
      # If this job succeeds, the credential guard is working correctly

  # Reproduces: "Unable to parse config file C:\Users\runneradmin/.aws/config"
  # https://github.com/SonarSource/peachee-cfamily/actions/runs/21646222381/job/62398839588#step:26:263
  test-s3-cache-windows:
    runs-on: github-windows-latest-s
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache with S3 on Windows
        id: cache-test
        uses: ./
        with:
          path: ~\AppData\Local\pip\Cache
          key: windows-test-${{ runner.os }}-${{ github.run_id }}
          restore-keys: windows-test-${{ runner.os }}-
          environment: dev
          backend: s3

      - name: Create something to cache
        run: |
          python -m pip install --upgrade pip
          pip install requests

  # Reproduces: ~/.aws/config corruption from multiple credential_process entries
  test-s3-cache-multiple-invocations:
    runs-on: github-ubuntu-latest-s
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2025.7.12

      # First cache invocation
      - name: Cache pip dependencies
        id: cache-pip
        uses: ./
        with:
          path: ~/.cache/pip
          key: multi-pip-${{ runner.os }}-${{ github.run_id }}
          restore-keys: multi-pip-${{ runner.os }}-
          environment: dev
          backend: s3

      # Second cache invocation in same job
      # Old approach would append duplicate profile to ~/.aws/config
      - name: Cache npm dependencies
        id: cache-npm
        uses: ./
        with:
          path: ~/.npm
          key: multi-npm-${{ runner.os }}-${{ github.run_id }}
          restore-keys: multi-npm-${{ runner.os }}-
          environment: dev
          backend: s3

      - name: Create something to cache
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          npm init -y

  # Reproduces: pre-existing AWS config from configure-aws-credentials
  # https://github.com/SonarSource/sonarsource-iam/actions/runs/21951781857/job/63404298650#step:5:9
  test-s3-cache-with-preset-aws-config:
    runs-on: github-ubuntu-latest-s
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2025.7.12

      # Simulate pre-existing AWS config (as if configure-aws-credentials ran before)
      - name: Create pre-existing AWS config
        run: |
          mkdir -p ~/.aws
          cat <<'AWSCONFIG' > ~/.aws/config
          [default]
          region = us-east-1
          output = json
          [profile some-other-profile]
          region = us-west-2
          AWSCONFIG
          cat <<'AWSCREDS' > ~/.aws/credentials
          [default]
          aws_access_key_id = AKIAFAKEDEFAULT
          aws_secret_access_key = fakesecretdefault
          [some-other-profile]
          aws_access_key_id = AKIAFAKEOTHER
          aws_secret_access_key = fakesecretother
          AWSCREDS
          echo "Pre-existing AWS config created"
          cat ~/.aws/config

      - name: Set conflicting AWS env vars
        run: |
          {
            echo "AWS_ACCESS_KEY_ID=AKIAFAKEENV"
            echo "AWS_SECRET_ACCESS_KEY=fakesecretenv"
            echo "AWS_SESSION_TOKEN=faketokenenv"
            echo "AWS_PROFILE=some-other-profile"
            echo "AWS_DEFAULT_PROFILE=some-other-profile"
          } >> "$GITHUB_ENV"

      # Cache action should override the conflicting credentials
      - name: Cache with S3
        id: cache-test
        uses: ./
        with:
          path: ~/.cache/pip
          key: preset-aws-${{ runner.os }}-${{ github.run_id }}
          restore-keys: preset-aws-${{ runner.os }}-
          environment: dev
          backend: s3

      - name: Re-override with fake credentials (simulating mid-job auth change)
        run: |
          {
            echo "AWS_ACCESS_KEY_ID=AKIAFAKEOVERRIDE"
            echo "AWS_SECRET_ACCESS_KEY=fakesecretoverride"
            echo "AWS_SESSION_TOKEN=faketokenoverride"
          } >> "$GITHUB_ENV"

      - name: Create something to cache
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

  # Regression test: git clean -ffdx must not break credential-guard post step
  # Reproduces: https://github.com/SonarSource/sonar-dummy/actions/runs/21997126216
  test-s3-cache-survives-git-clean:
    runs-on: github-ubuntu-latest-s
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2025.7.12

      - name: Cache with S3
        id: cache-test
        uses: ./
        with:
          path: ~/.cache/pip
          key: git-clean-test-${{ runner.os }}-${{ github.run_id }}
          restore-keys: git-clean-test-${{ runner.os }}-
          environment: dev
          backend: s3

      # Simulate what actions/checkout does when clean: true (the default).
      # This is exactly what broke the .actions/ workspace copy approach.
      - name: Run git clean -ffdx (simulates actions/checkout clean)
        run: |
          git clean -ffdx
          echo "Workspace cleaned. Post steps should still work."

      - name: Create something to cache
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

  # Regression test: with CI_METRICS_ENABLED, the cache-metrics post step must still find
  # `./.actions/cache-metrics` after another action runs actions/checkout (clean + reset + force-checkout),
  # which is what wiped the symlink in https://github.com/SonarSource/sonar-dummy/actions/runs/26102811096/job/76758257880
  test-s3-cache-survives-git-clean-with-metrics:
    runs-on: github-ubuntu-latest-s
    permissions:
      id-token: write
      contents: read
    env:
      CI_METRICS_ENABLED: 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2025.7.12

      - name: Cache with S3 (metrics enabled)
        id: cache-test
        uses: ./
        with:
          path: ~/.cache/pip
          key: git-clean-metrics-test-${{ runner.os }}-${{ github.run_id }}
          restore-keys: git-clean-metrics-test-${{ runner.os }}-
          environment: dev
          backend: s3

      # Simulate what a nested actions/checkout does (clean → reset --hard → fetch → checkout --force).
      # This is the sequence that wiped `.actions/cache-metrics` from the workspace between main and post
      # in the pre-commit job — recovery is handled by the `symlink-keeper` post step.
      - name: Re-run actions/checkout (simulates nested action's checkout)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create something to cache
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      # SUCCESS: credential-guard post step runs, then runs-on/cache saves to S3

  # Validates cache-size-bytes output + ${CI_METRICS_DIR}/cache-*.json (gated by CI_METRICS_ENABLED).
  test-cache-metrics-output:
    runs-on: github-ubuntu-latest-s
    permissions:
      id-token: write
      contents: read
    env:
      # Opt-in to the metrics emission
      CI_METRICS_ENABLED: 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2025.7.12

      - name: Cache pip with S3 (metrics check)
        id: cache-metrics-test
        uses: ./
        with:
          path: ~/.cache/pip
          key: metrics-test-${{ runner.os }}-${{ github.run_id }}
          restore-keys: metrics-test-${{ runner.os }}-
          environment: dev
          backend: s3

      - name: Verify cache-size-bytes output is set
        run: |
          if [[ -z "${{ steps.cache-metrics-test.outputs.cache-size-bytes }}" ]]; then
            echo "::error::cache-size-bytes output was empty"
            exit 1
          fi
          echo "cache-size-bytes = ${{ steps.cache-metrics-test.outputs.cache-size-bytes }}"

      - name: Verify /tmp/ci-metrics/cache-*.json was written at restore-time
        run: |
          shopt -s nullglob
          files=(/tmp/ci-metrics/cache-*.json)
          if (( ${#files[@]} == 0 )); then
            echo "::error::no cache-*.json under /tmp/ci-metrics/"
            ls -la /tmp/ci-metrics/ || true
            exit 1
          fi
          for f in "${files[@]}"; do
            echo "--- $f ---"
            cat "$f"
            jq -e '.step, .key, .backend, ."cache-hit", ."size-bytes-restored", ."timestamp-restored"' "$f" >/dev/null
          done

      - name: Populate cache path so the post-step measures a saved size
        run: |
          python -m pip install --upgrade pip
          pip install pytest

  # File-only path: metrics on when ${CI_METRICS_DIR}/enabled exists, even with no `env.CI_METRICS_ENABLED`.
  # Simulates a runner whose pre-job hook (github-runners-infra/hooks/job-started.sh) wrote the decision file.
  test-cache-metrics-via-decision-file:
    runs-on: github-ubuntu-latest-s
    permissions:
      id-token: write
      contents: read
    # No CI_METRICS_ENABLED env on purpose — the gate must enable via the file alone.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2025.7.12

      - name: Simulate runner pre-job decision file
        run: |
          mkdir -p /tmp/ci-metrics
          : > /tmp/ci-metrics/enabled
          ls -la /tmp/ci-metrics

      - name: Cache pip with S3 (file-only gate)
        id: cache-file-gate
        uses: ./
        with:
          path: ~/.cache/pip
          key: file-gate-test-${{ runner.os }}-${{ github.run_id }}
          restore-keys: file-gate-test-${{ runner.os }}-
          environment: dev
          backend: s3

      - name: Verify metrics ran (cache-size-bytes output is set)
        run: |
          if [[ -z "${{ steps.cache-file-gate.outputs.cache-size-bytes }}" ]]; then
            echo "::error::cache-size-bytes output was empty — gate did not honour the decision file"
            exit 1
          fi
          echo "cache-size-bytes = ${{ steps.cache-file-gate.outputs.cache-size-bytes }}"

      - name: Verify ${CI_METRICS_DIR}/cache-*.json was written
        run: |
          shopt -s nullglob
          files=(/tmp/ci-metrics/cache-*.json)
          if (( ${#files[@]} == 0 )); then
            echo "::error::no cache-*.json under /tmp/ci-metrics/ — file-gate path did not emit metrics"
            ls -la /tmp/ci-metrics/ || true
            exit 1
          fi

      - name: Populate cache path so the post-step measures a saved size
        run: |
          python -m pip install --upgrade pip
          pip install pytest

  # Workflow opt-out beats the decision file. Pre-touches the file (as the runner pre-job hook would),
  # then sets CI_METRICS_ENABLED='false' at the job level. Metrics MUST NOT run, no cache-*.json written.
  test-cache-metrics-workflow-false-beats-file:
    runs-on: github-ubuntu-latest-s
    permissions:
      id-token: write
      contents: read
    env:
      CI_METRICS_ENABLED: 'false'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2025.7.12

      - name: Simulate runner pre-job decision file (will be overridden by workflow env)
        run: |
          mkdir -p /tmp/ci-metrics
          : > /tmp/ci-metrics/enabled
          ls -la /tmp/ci-metrics

      - name: Cache pip with S3 (workflow opt-out)
        id: cache-workflow-false
        uses: ./
        with:
          path: ~/.cache/pip
          key: workflow-false-test-${{ runner.os }}-${{ github.run_id }}
          restore-keys: workflow-false-test-${{ runner.os }}-
          environment: dev
          backend: s3

      - name: Verify metrics did NOT run (cache-size-bytes empty, no cache-*.json)
        run: |
          if [[ -n "${{ steps.cache-workflow-false.outputs.cache-size-bytes }}" ]]; then
            echo "::error::cache-size-bytes was '${{ steps.cache-workflow-false.outputs.cache-size-bytes }}' — workflow CI_METRICS_ENABLED=false did NOT win over the decision file"
            exit 1
          fi
          shopt -s nullglob
          files=(/tmp/ci-metrics/cache-*.json)
          if (( ${#files[@]} > 0 )); then
            echo "::error::cache-*.json files present — workflow CI_METRICS_ENABLED=false did NOT skip the cache-metrics sub-action"
            ls -la /tmp/ci-metrics/
            exit 1
          fi
          # The propagator step should have removed the pre-existing enabled file.
          if [[ -e /tmp/ci-metrics/enabled ]]; then
            echo "::error::/tmp/ci-metrics/enabled still exists — toggle step did not honour CI_METRICS_ENABLED=false"
            exit 1
          fi
          echo "ok: gate correctly disabled via workflow opt-out"

      - name: Populate cache path so the post-step has something to save
        run: |
          python -m pip install --upgrade pip
          pip install pytest

  all-green:
    name: All Tests
    if: always()
    needs:
      - test-github-cache
      - test-s3-cache
      - test-s3-cache-with-fallback
      - test-s3-cache-with-credential-interference
      - test-s3-cache-windows
      - test-s3-cache-multiple-invocations
      - test-s3-cache-with-preset-aws-config
      - test-s3-cache-survives-git-clean
      - test-s3-cache-survives-git-clean-with-metrics
      - test-cache-metrics-output
      - test-cache-metrics-via-decision-file
      - test-cache-metrics-workflow-false-beats-file
    runs-on: github-ubuntu-latest-s
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
