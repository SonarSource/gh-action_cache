---
name: Test Credential Isolation
run-name: Test credential isolation (${{ github.head_ref || github.ref_name }})

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  credential-isolation-tests:
    # Calls the test suite hosted in sonar-dummy, passing the current
    # branch so it checks out this ref of gh-action_cache for testing.
    uses: SonarSource/sonar-dummy/.github/workflows/test-cache-isolation.yaml@feat/mmatuszny/PREQ-3830-test
    with:
      cache_action_ref: ${{ github.head_ref || github.ref_name }}
    permissions:
      id-token: write
      contents: read
      actions: read
      checks: read
    secrets:
      checkout_token: ${{ github.token }}
