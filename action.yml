name: S3 Cache action
description: Cache files on S3 with branch-specific paths for granular permissions
author: SonarSource

inputs:
  path:
    description: A list of files, directories, and wildcard patterns to cache and restore
    required: true
  key:
    description: An explicit key for restoring and saving the cache
    required: true
  restore-keys:
    description: An ordered list of prefix-matched keys to use for restoring stale cache if no cache hit occurred for key
  upload-chunk-size:
    description: The chunk size used to split up large files during upload, in bytes
  enableCrossOsArchive:
    description: When enabled, allows to save or restore caches that can be restored or saved respectively on other platforms
    default: false
  fail-on-cache-miss:
    description: Fail the workflow if cache entry is not found
    default: false
  lookup-only:
    description: Check if a cache entry exists for the given input(s) (key, restore-keys) without downloading the cache
    default: false
  environment:
    description: Environment to use ('dev' or 'prod', 's3' backend only).
    default: prod
  fallback-branch:
    description: >
      Explicit fallback branch for restore keys (pattern 'branch-*', 's3' backend only).
      Always honoured when set, regardless of 'fallback-to-default-branch'.
      If not set, the repository default branch is used when 'fallback-to-default-branch' is true.
  fallback-to-default-branch:
    description: >
      When enabled, automatically adds a fallback restore key pointing to the default branch cache.
      Only applies to the S3 backend.
    default: 'true'
  backend:
    description: >
      Force cache backend ('github' or 's3'). If not set, falls back to the CACHE_BACKEND environment variable if defined,
      then automatically determined based on repository visibility.
  import-github-cache:
    description: >
      Import GitHub cache to S3 when no S3 cache exists (migration mode). Enabled by default when using S3 backend.
      Set to 'false' to disable, or control via the CACHE_IMPORT_GITHUB environment variable.
    default: ''

outputs:
  cache-hit:
    description: A boolean value to indicate an exact match was found for the primary key
    value: ${{ steps.cache-outputs.outputs.cache-hit }}
  cache-matched-key:
    description: >
      The cache key for which a match was found. Equals the primary key on an exact hit, one of the user-provided restore keys on a partial
      hit, or empty when no match was found.
    value: ${{ steps.cache-outputs.outputs.matched-key }}
  restore-key-hit:
    description: >
      The restore key that was prefix-matched. Populated only when `cache-hit` is `false` AND a restore key matched (partial hit). Empty on
      exact hits and on full misses — i.e. set if this was a partial restore.
    value: ${{ steps.cache-outputs.outputs.cache-hit != 'true' && steps.cache-outputs.outputs.matched-key || '' }}
  backend:
    description: The cache backend that was actually used for this invocation (`github` or `s3`).
    value: ${{ steps.cache-backend.outputs.cache-backend }}
  cache-size-bytes:
    description: >
      Total size in bytes of the cached path(s) at restore-time (Linux only; empty on other platforms).
      The action also writes a per-invocation JSON record to /tmp/ci-metrics/cache-${step}.json for the pipeline-runtime-metrics
      job-completed hook to ingest.
    value: ${{ steps.cache-metrics.outputs.cache-size-bytes }}

runs:
  using: composite
  steps:
    - name: Determine cache backend and import mode
      id: cache-backend
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        REPO_VISIBILITY: ${{ github.event.repository.visibility }}
        FORCED_BACKEND: ${{ inputs.backend }}
        INPUT_IMPORT_GITHUB_CACHE: ${{ inputs.import-github-cache }}
      run: |
        echo "::group::Resolve backend"
        BACKEND_SOURCE="auto"
        WAS_GITHUB_DEFAULT="false"
        if [[ "$FORCED_BACKEND" == "github" || "$FORCED_BACKEND" == "s3" ]]; then
          CACHE_BACKEND="$FORCED_BACKEND"
          BACKEND_SOURCE="forced"
          echo "Using forced backend from input: $CACHE_BACKEND"
        elif [[ "$CACHE_BACKEND" == "github" || "$CACHE_BACKEND" == "s3" ]]; then
          BACKEND_SOURCE="forced"
          echo "Using backend from CACHE_BACKEND environment variable: $CACHE_BACKEND"
        else
          # If visibility is not available in the event, try to get it from the API
          if [[ -z "$REPO_VISIBILITY" || "$REPO_VISIBILITY" = "null" ]]; then
            REPO_VISIBILITY=$(curl -s -H "Authorization: token ${{ github.token }}" \
              "https://api.github.com/repos/${{ github.repository }}" | \
              jq -r '.visibility // "private"')
          fi
          echo "Repository visibility: $REPO_VISIBILITY"
          CACHE_BACKEND="s3"
          if [[ "$REPO_VISIBILITY" == "public" ]]; then
            WAS_GITHUB_DEFAULT="true"
            echo "Using S3 cache for public repository (previously GitHub default — migration eligible)"
          else
            echo "Using S3 cache for private/internal repository"
          fi
        fi
        echo "::endgroup::"

        echo "::group::Resolve GitHub cache import mode"
        # Resolution order: input → CACHE_IMPORT_GITHUB env var → true if backend was explicitly forced (migration scenario)
        #                 → true if public repo switching from GitHub default → false (private/internal, already on S3)
        if [[ -n "$INPUT_IMPORT_GITHUB_CACHE" ]]; then
          IMPORT_GITHUB="$INPUT_IMPORT_GITHUB_CACHE"
          echo "Using import mode from input: $IMPORT_GITHUB"
        elif [[ -n "${CACHE_IMPORT_GITHUB:-}" ]]; then
          IMPORT_GITHUB="$CACHE_IMPORT_GITHUB"
          echo "Using import mode from CACHE_IMPORT_GITHUB environment variable: $IMPORT_GITHUB"
        elif [[ "$BACKEND_SOURCE" == "forced" ]]; then
          IMPORT_GITHUB="true"
          echo "Using default import mode (backend explicitly forced to S3 — migration scenario): $IMPORT_GITHUB"
        elif [[ "$WAS_GITHUB_DEFAULT" == "true" ]]; then
          IMPORT_GITHUB="true"
          echo "Using default import mode (public repository — previously used GitHub cache by default): $IMPORT_GITHUB"
        else
          IMPORT_GITHUB="false"
          echo "Using default import mode (private/internal repository — already on S3): $IMPORT_GITHUB"
        fi
        echo "::endgroup::"

        {
          echo "cache-backend=$CACHE_BACKEND"
          echo "backend-source=$BACKEND_SOURCE"
          echo "was-github-default=$WAS_GITHUB_DEFAULT"
          echo "import-github=$IMPORT_GITHUB"
        } >> "$GITHUB_OUTPUT"
        echo "ACTION_PATH_CACHE=${{ github.action_path }}" >> "$GITHUB_ENV"

    - name: Cache with GitHub Actions (public repos)
      if: steps.cache-backend.outputs.cache-backend == 'github'
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      id: github-cache
      with:
        path: ${{ inputs.path }}
        key: ${{ inputs.key }}
        restore-keys: ${{ inputs.restore-keys }}
        upload-chunk-size: ${{ inputs.upload-chunk-size }}
        enableCrossOsArchive: ${{ inputs.enableCrossOsArchive }}
        fail-on-cache-miss: ${{ inputs.fail-on-cache-miss }}
        lookup-only: ${{ inputs.lookup-only }}

    - name: Setup S3 cache credentials
      if: steps.cache-backend.outputs.cache-backend == 's3'
      id: aws-auth
      uses: SonarSource/gh-action_cache/credential-setup@v1
      with:
        environment: ${{ inputs.environment }}

    - name: Prepare cache keys
      if: steps.cache-backend.outputs.cache-backend == 's3'
      shell: bash
      id: prepare-keys
      env:
        INPUT_KEY: ${{ inputs.key }}
        INPUT_RESTORE_KEYS: ${{ inputs.restore-keys }}
        INPUT_FALLBACK_BRANCH: ${{ inputs.fallback-branch }}
        INPUT_FALLBACK_TO_DEFAULT_BRANCH: ${{ inputs.fallback-to-default-branch }}
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: $ACTION_PATH_CACHE/scripts/prepare-keys.sh

    - name: Cache on S3
      if: steps.cache-backend.outputs.cache-backend == 's3'
      uses: runs-on/cache@50350ad4242587b6c8c2baa2e740b1bc11285ff4 # v4.3.0
      id: s3-cache
      env:
        RUNS_ON_S3_BUCKET_CACHE: sonarsource-s3-cache-${{ inputs.environment }}-bucket
        AWS_DEFAULT_REGION: eu-central-1
        AWS_REGION: eu-central-1
        # Step-level env: overrides GITHUB_ENV values for this step
        AWS_ACCESS_KEY_ID: ${{ steps.aws-auth.outputs.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ steps.aws-auth.outputs.AWS_SECRET_ACCESS_KEY }}
        AWS_SESSION_TOKEN: ${{ steps.aws-auth.outputs.AWS_SESSION_TOKEN }}
        # Clear profile so SDK uses env credentials, not ~/.aws/credentials
        AWS_PROFILE: ''
        AWS_DEFAULT_PROFILE: ''
      with:
        path: ${{ inputs.path }}
        key: ${{ steps.prepare-keys.outputs.branch-key }}
        restore-keys: ${{ steps.prepare-keys.outputs.branch-restore-keys }}
        upload-chunk-size: ${{ inputs.upload-chunk-size }}
        enableCrossOsArchive: ${{ inputs.enableCrossOsArchive }}
        # When import mode is active, suppress fail-on-cache-miss here: a subsequent step handles it after also attempting the GitHub cache
        # fallback.
        fail-on-cache-miss: ${{ steps.cache-backend.outputs.import-github == 'true' && 'false' || inputs.fail-on-cache-miss }}
        lookup-only: ${{ inputs.lookup-only }}

    - name: Import GitHub cache to S3 (migration fallback)
      if: >-
        steps.cache-backend.outputs.cache-backend == 's3' &&
        steps.s3-cache.outputs.cache-hit != 'true' &&
        steps.cache-backend.outputs.import-github == 'true'
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      id: github-import
      with:
        path: ${{ inputs.path }}
        key: ${{ inputs.key }}
        restore-keys: ${{ inputs.restore-keys }}
        lookup-only: ${{ inputs.lookup-only }}
        fail-on-cache-miss: false

    - name: Enforce fail-on-cache-miss after GitHub import fallback
      if: >-
        steps.cache-backend.outputs.cache-backend == 's3' &&
        steps.cache-backend.outputs.import-github == 'true' &&
        inputs.fail-on-cache-miss == 'true' &&
        steps.s3-cache.outputs.cache-hit != 'true' &&
        steps.github-import.outputs.cache-matched-key == ''
      shell: bash
      env:
        CACHE_KEY: ${{ inputs.key }}
      run: |
        echo "::error::Cache miss: no cache found in S3 or GitHub for key '${CACHE_KEY}'"
        exit 1

    # Aggregate `cache-hit` and `cache-matched-key` across the three possible restore steps once, so every consumer (the top-level outputs
    # and the cache-metrics sub-action) reads from a single source instead of repeating the triple-OR. Adding a fourth backend would only
    # touch this step.
    - name: Aggregate cache outputs across backends
      id: cache-outputs
      shell: bash
      env:
        HIT_GITHUB: ${{ steps.github-cache.outputs.cache-hit }}
        HIT_S3: ${{ steps.s3-cache.outputs.cache-hit }}
        HIT_IMPORT: ${{ steps.github-import.outputs.cache-hit }}
        MATCHED_GITHUB: ${{ steps.github-cache.outputs.cache-matched-key }}
        MATCHED_S3: ${{ steps.s3-cache.outputs.cache-matched-key }}
        MATCHED_IMPORT: ${{ steps.github-import.outputs.cache-matched-key }}
      run: |
        CACHE_HIT="${HIT_GITHUB:-${HIT_S3:-${HIT_IMPORT:-}}}"
        MATCHED_KEY="${MATCHED_GITHUB:-${MATCHED_S3:-${MATCHED_IMPORT:-}}}"
        echo "cache-hit=${CACHE_HIT}" >> "$GITHUB_OUTPUT"
        echo "matched-key=${MATCHED_KEY}" >> "$GITHUB_OUTPUT"

    # CI_METRICS_ENABLED is set by the runner pod template / WarpBuild AMI for the BUILD-11068 pilot repos.
    # Restricted to the S3 backend so credential-guard-post (which only runs on S3) can act as the symlink
    # keeper that recreates `.actions/cache-metrics` if a nested actions/checkout wiped it before the
    # cache-metrics post step — see test-s3-cache-survives-git-clean-with-metrics.
    # The symlink-into-the-workspace pattern is the one documented in SonarSource/ci-github-actions
    # CONTRIBUTE.md (BUILD-9094) — required so this composite can reference its own `cache-metrics` Node20
    # sub-action via `uses: ./.actions/cache-metrics` from inside container jobs and nested local actions.
    - name: Prepare local cache-metrics sub-action
      id: cache-metrics-prep
      if: >-
        runner.os == 'Linux' && env.CI_METRICS_ENABLED == 'true' &&
        steps.cache-backend.outputs.cache-backend == 's3'
      shell: bash
      # Fail-open: the metrics flow must never break the cache flow. The next step's `if:` will skip gracefully if preparation fails.
      run: |
        echo "::group::Prepare .actions/cache-metrics symlink"
        set +e
        ACTION_PATH_CACHE="${{ github.action_path }}"
        echo "github.action_path=$ACTION_PATH_CACHE"
        mkdir -p .actions
        ln -sf "$ACTION_PATH_CACHE/cache-metrics" .actions/cache-metrics
        ls -la .actions/*
        if [ ! -e .actions/cache-metrics/action.yml ]; then
          echo "::warning::cache-metrics: could not prepare .actions/cache-metrics symlink — skipping metrics."
          echo "prepared=false" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"
          exit 0
        fi
        # `git add -f` is best-effort: it survives a bare `git clean -ffdx`, but not the subsequent
        # `git reset --hard HEAD` + `git checkout --force <ref>` that actions/checkout runs. The real
        # safety net is credential-guard-post's symlink keeper (see action.yml `Credential guard` step).
        if ! git add -f .actions 2>/dev/null; then
          echo "::warning::cache-metrics: could not 'git add' the .actions symlink."
        fi
        echo "prepared=true" >> "$GITHUB_OUTPUT"
        echo "::endgroup::"
        exit 0

    - name: Emit cache metrics (size + saved)
      if: steps.cache-metrics-prep.outputs.prepared == 'true'
      id: cache-metrics
      uses: ./.actions/cache-metrics
      with:
        path: ${{ inputs.path }}
        key: ${{ inputs.key }}
        cache-hit: ${{ steps.cache-outputs.outputs.cache-hit }}
        matched-key: ${{ steps.cache-outputs.outputs.matched-key }}
        backend: ${{ steps.cache-backend.outputs.cache-backend }}
        lookup-only: ${{ inputs.lookup-only }}
        step-id: ${{ github.action }}

    - name: Credential guard for S3 cache save
      if: steps.cache-backend.outputs.cache-backend == 's3'
      uses: SonarSource/gh-action_cache/credential-guard@v1
      with:
        credentials-file: ${{ steps.aws-auth.outputs.credentials-file }}
        # Pass our action path so credential-guard-post can recreate the workspace symlink to cache-metrics
        # if a nested actions/checkout (clean → reset --hard → checkout --force) wiped it from the workspace.
        # Empty when metrics are disabled — the post step is a no-op then.
        cache-metrics-action-path: ${{ steps.cache-metrics-prep.outputs.prepared == 'true' && format('{0}/cache-metrics', github.action_path) || '' }}

branding:
  icon: upload-cloud
  color: blue
