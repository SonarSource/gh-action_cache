name: S3 Cache proxy action
description: Cache files on S3 with branch-specific paths for granular permissions
author: SonarSource

inputs:
  s3-bucket:
    description: 'S3 bucket name for cache storage'
    required: true
  s3-prefix:
    description: 'S3 key prefix for cache objects'
    required: false
    default: 'cache'
  proxy-port:
    description: 'Port for the HTTP proxy server'
    required: false
    default: '8080'
  environment:
    description: Environment to use (dev or prod)
    default: prod

outputs:
  proxy-url:
    description: 'URL of the running proxy server'
    value: 127.0.0.1:${{ inputs.proxy-port }}

runs:
  using: composite
  steps:
    - name: Install mise
      uses: jdx/mise-action@9dc7d5dd454262207dea3ab5a06a3df6afc8ff26 # v3.4.1
      with:
        version: 2025.11.3
        mise_toml: |
          [tools]
          python = "3.11"
          poetry = "2.2.1"

    - name: Install proxy dependencies
      shell: bash
      run: |
        cd ${{ github.action_path }}
        poetry install --no-interaction --no-root

    - name: Start S3 HTTP Cache Proxy
      id: start-proxy
      shell: bash
      run: |
        cd ${{ github.action_path }}
        source scripts/get-aws-credentials.sh
        poetry run ccache-s3-proxy &
        PROXY_PID=$!
        echo "proxy-url=127.0.0.1:${PROXY_PORT}" >> $GITHUB_OUTPUT
        # echo "CCACHE_PROXY_PID=$PROXY_PID" >> $GITHUB_ENV

        # Verify proxy is running
        if ! kill -0 $PROXY_PID 2>/dev/null; then
          echo "Error: Proxy failed to start"
          exit 1
        fi

        echo "Proxy started successfully on port ${{ inputs.proxy-port }} (PID: $PROXY_PID)"
      env:
        S3_BUCKET: ${{ inputs.s3-bucket }}
        S3_PREFIX: ${{ inputs.s3-prefix }}
        PROXY_PORT: ${{ inputs.proxy-port }}
        PROXY_LOG_FILE: ${{ github.workspace }}/proxy.log
        AWS_REGION: eu-central-1
        DEFAULT_REGION: eu-central-1

branding:
  icon: upload-cloud
  color: blue
